<form class="erp-form" [formGroup]="form" (ngSubmit)="onSearch()">
  <div class="erp-header">
    <div class="left">
      <div class="title">Buscar venta</div>
    </div>
  </div>

  <mat-divider></mat-divider>

  <div class="erp-body">
    <div class="section">
      <div class="grid grid-2">
        <mat-form-field appearance="outline">
          <mat-label>Código</mat-label>
          <input matInput type="number" formControlName="code_Sale" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Total</mat-label>
          <input matInput type="number" formControlName="total_Sale" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha inicio</mat-label>
          <input matInput type="date" formControlName="startDate" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha fin</mat-label>
          <input matInput type="date" formControlName="endDate" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="status_Sale" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tipo</mat-label>
          <input matInput formControlName="type_Sale" autocomplete="off" />
        </mat-form-field>
      </div>
    </div>
  </div>

  <div class="erp-footer">
    <button mat-stroked-button type="button" (click)="onReset()">Limpiar</button>
    <button mat-stroked-button type="button" (click)="onClose()">Cerrar</button>
    <button mat-flat-button color="primary" type="submit">Buscar</button>
  </div>
</form>
