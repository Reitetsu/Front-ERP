<mat-card class="page-card">
  <mat-card-header>
    <mat-card-title>Productos</mat-card-title>

    <span class="spacer"></span>

    <button mat-icon-button matTooltip="Nuevo" (click)="openAdd()">
      <mat-icon>add</mat-icon>
    </button>

    <button mat-icon-button matTooltip="Editar" (click)="openEdit()" [disabled]="!isRowSelected">
      <mat-icon>edit</mat-icon>
    </button>

    <button mat-icon-button matTooltip="Eliminar" (click)="deleteSelected()" [disabled]="!isRowSelected">
      <mat-icon>close</mat-icon>
    </button>

    <button mat-icon-button matTooltip="Buscar" (click)="openSearch()">
      <mat-icon>search</mat-icon>
    </button>

    <button mat-icon-button matTooltip="Descargar Excel" (click)="downloadExcel()">
      <mat-icon>download</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content>
    <mat-drawer-container class="drawer-container">
      <mat-drawer-content>
        <div class="grid-wrap">
          <mtx-grid
            [data]="rows"
            [trackBy]="trackById"
            [columns]="columns"
            [loading]="loading"

            [rowSelectable]="true"
            [hideRowSelectionCheckbox]="true"
            [multiSelectable]="false"

            [showToolbar]="true"

            [columnHideable]="true"
            [columnSortable]="true"
            [columnResizable]="true"


            [showPaginator]="true"
            [pageOnFront]="false"
            [length]="totalItems"
            [pageSize]="itemsPerPage"
            [pageIndex]="currentPage - 1"
            [pageSizeOptions]="[25, 50, 100]"
            (rowSelectionChange)="onGridSelection($event)"
            (page)="onGridPageChange($event)">
          </mtx-grid>
        </div>
      </mat-drawer-content>

      <!-- ✅ Drawer ÚNICO -->
      <mat-drawer #drawerEnd mode="side" position="end" class="drawer">
        <ng-container [ngSwitch]="drawerMode">

          <!-- ADD -->
          <app-producto-add
            *ngSwitchCase="'add'"
            [productTypes]="productTypes"
            [measurements]="measurements"
            (submitProduct)="createFromDrawer($event)"
            (cancel)="closeDrawer()">
          </app-producto-add>
          <!-- Otros modos (luego) -->
          <div *ngSwitchCase="'search'" style="padding: 8px;">
            Search pendiente…
          </div>

          <div *ngSwitchCase="'edit'" style="padding: 8px;">
            Edit pendiente…
          </div>

          <div *ngSwitchDefault style="padding: 8px;">
            Selecciona una acción…
          </div>

        </ng-container>
      </mat-drawer>
    </mat-drawer-container>
  </mat-card-content>
</mat-card>
