<form class="erp-form" [formGroup]="form" (ngSubmit)="onSearch()">
  <div class="erp-header">
    <div class="left">
      <div class="title">Buscar menú</div>
    </div>
  </div>

  <mat-divider></mat-divider>

  <div class="erp-body">
    <div class="section">
      <div class="grid grid-2">
        <mat-form-field appearance="outline">
          <mat-label>Código</mat-label>
          <input matInput type="number" formControlName="code_Menu" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Precio</mat-label>
          <input matInput type="number" formControlName="price_Menu" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name_Menu" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Descripción</mat-label>
          <input matInput formControlName="description_Menu" autocomplete="off" />
        </mat-form-field>
      </div>
    </div>
  </div>

  <div class="erp-footer">
    <button mat-stroked-button type="button" (click)="onReset()">Limpiar</button>
    <button mat-stroked-button type="button" (click)="onClose()">Cerrar</button>
    <button mat-flat-button color="primary" type="submit">Buscar</button>
  </div>
</form>
